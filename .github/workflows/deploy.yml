# ─────────────────────────────────────────────────────────────────────────────
# SCS Frontend — GitHub Actions CI/CD Pipeline
# ─────────────────────────────────────────────────────────────────────────────
#
# What this pipeline does:
# ────────────────────────
# 1. Triggers on EVERY push to any branch     → runs Build + Lint
# 2. Triggers on merge/push to "main" branch  → runs Build + Lint + Deploy
# 3. Sends success/failure notification via
#    GitHub Actions built-in status (visible in PR + email)
#
# Required GitHub Secrets (set these in your repo settings):
# ──────────────────────────────────────────────────────────
#   VERCEL_TOKEN        → your Vercel API token
#   VERCEL_ORG_ID       → your Vercel organization/team ID
#   VERCEL_PROJECT_ID   → your Vercel project ID
#
# How to get these secrets — see README.md
# ─────────────────────────────────────────────────────────────────────────────

name: SCS Frontend CI/CD

on:
  push:
    branches:
      - "**"          # Build on every push to ANY branch
  pull_request:
    branches:
      - main          # Also run on PRs targeting main

# Cancel in-progress runs for the same branch (saves minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1: Build & Lint
  # Runs on every push to every branch
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: 🔨 Build & Lint
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node.js (version matches your local dev)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"          # Cache node_modules for faster runs

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci               # ci = clean install (faster + deterministic)

      # 4. Run ESLint
      # If your project doesn't have ESLint yet, this step is skipped safely
      - name: Run Lint
        run: npm run lint --if-present

      # 5. Build the project (Vite production build)
      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production

      # 6. Upload build artifact (so deploy job can use it)
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1     # Keep for 1 day (just enough for deploy job)

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy to Vercel
  # Only runs when code is pushed/merged to the "main" branch
  # Depends on build job passing first
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build                  # Only runs if build job succeeds
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      # 1. Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Install Vercel CLI
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # 5. Pull Vercel environment & project settings
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # 6. Build using Vercel's build system
      - name: Build with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # 7. Deploy to Vercel production
      - name: Deploy to Vercel production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # 8. Post deployment URL as a comment on the commit
      - name: Comment deployment URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `✅ **Deployed successfully!**\n\n🔗 URL: ${{ steps.deploy.outputs.deployment_url }}`
            })

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3: Notify
  # Runs after both jobs finish — reports success or failure
  # ───────────────────────────────────────────────────────────────────────────
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [build, deploy]
    # Always run notify — even if previous jobs failed
    if: always()

    steps:
      - name: Report success
        if: needs.build.result == 'success' && (needs.deploy.result == 'success' || needs.deploy.result == 'skipped')
        run: |
          echo "✅ Pipeline passed!"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"

      - name: Report failure
        if: needs.build.result == 'failure' || needs.deploy.result == 'failure'
        run: |
          echo "❌ Pipeline FAILED!"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          exit 1    # Forces the notify job to show as red in GitHub UI
